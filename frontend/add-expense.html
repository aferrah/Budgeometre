<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajouter une transaction - Budgeometre</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/add-expense.css">
    <link rel="stylesheet" href="css/add-expense-extra.css">
</head>
<body>
    <details>
        <summary></summary>
        <nav class="menu">
            <a href="index.html">Accueil</a>
            <a href="budget-dashboard.html">Dashboard</a>
            <a href="#">Objectifs</a>
            <a href="categories.html">Categories</a>
            <a href="#">Transactions</a>
        </nav>
    </details>

    <div class="container">
        <header>
            <h1>Budgeometre</h1>
        </header>

        <main class="add-expense-page">
            <section class="form-card">
                <h2>Nouvelle transaction</h2>

                <form id="expense-form">
                    <div class="form-row">
                        <label>Type de transaction</label>
                        <div class="toggle-group">
                            <input type="radio" id="type-depense" name="type" value="depense" checked>
                            <label for="type-depense" class="toggle-btn">Depense</label>

                            <input type="radio" id="type-revenu" name="type" value="revenu">
                            <label for="type-revenu" class="toggle-btn">Revenu</label>
                        </div>
                    </div>

                    <div class="form-row">
                        <label for="label">Libelle</label>
                        <input type="text" id="label" name="label" placeholder="Ex : Courses, Salaire..." required>
                    </div>

                    <div class="form-row">
                        <label for="amount">Montant (&#8364;)</label>
                        <div class="input-wrapper" id="amount-wrapper">
                            <input type="text" id="amount" name="amount" placeholder="Ex : 45.90" required autocomplete="off">
                            <p class="error-message">Veuillez entrer un nombre valide (ex: 45.90)</p>
                        </div>
                    </div>

                    <div class="form-row two-columns">
                        <div>
                            <label for="category">Categorie</label>
                            <select id="category" name="category" required>
                                <option value="" disabled selected>Choisir une categorie</option>
                            </select>
                        </div>

                        <div>
                            <label for="date">Date</label>
                            <input type="date" id="date" name="date">
                        </div>
                    </div>

                    <div class="form-row">
                        <label for="comment">Commentaire</label>
                        <textarea id="comment" name="comment" rows="3" placeholder="Optionnel : details de la transaction..."></textarea>
                    </div>

                    <div class="form-actions">
                        <a href="index.html" class="btn-secondary">Annuler</a>
                        <button type="submit" class="btn-primary" id="submit-btn">Enregistrer</button>
                    </div>

                    <p id="form-message" class="form-message" hidden></p>
                </form>
            </section>
        </main>

        <footer></footer>
    </div>

    <script src="js/api.js"></script>
    <script src="js/add-expense.js"></script>
</body>
</html>
